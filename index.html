<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f0f; color: #fff; font-family: sans-serif; }
#top { padding: 10px; background: #1a1a1a; display: flex; gap: 8px; flex-wrap: wrap; }
#top input { flex: 1; min-width: 180px; padding: 8px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; font-size: 13px; }
.btn { padding: 8px 14px; background: #e50914; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
#proxy-bar { padding: 8px 10px; background: #111; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #222; }
#proxy-bar input { flex: 1; min-width: 200px; padding: 6px 8px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; font-size: 12px; }
#proxy-bar label { font-size: 12px; color: #aaa; white-space: nowrap; }
.sbtn { padding: 6px 10px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
video { width: 100%; max-height: 220px; background: #000; display: block; }
#status { padding: 7px 12px; font-size: 12px; color: #aaa; background: #111; border-bottom: 1px solid #222; min-height: 30px; }
#channels { overflow-y: auto; max-height: calc(100vh - 340px); }
.group-title { padding: 7px 12px; background: #1e1e1e; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; position: sticky; top: 0; z-index: 1; }
.channel { display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer; border-bottom: 1px solid #1a1a1a; }
.channel:active, .channel.active { background: #c0000f; }
.channel img { width: 34px; height: 34px; object-fit: contain; border-radius: 4px; background: #222; flex-shrink: 0; }
.channel span { font-size: 13px; line-height: 1.3; }
</style>
</head>
<body>

<div id="top">
  <input id="m3u-url" placeholder="M3U URL paste করো" />
  <button class="btn" onclick="loadFromUrl()">Load URL</button>
  <button class="btn" onclick="document.getElementById('m3u-file').click()">📁 File</button>
  <input type="file" id="m3u-file" accept=".m3u,.m3u8,.txt" style="display:none" onchange="loadFromFile(event)" />
</div>

<div id="proxy-bar">
  <label>🔗 Proxy:</label>
  <input id="proxy-input" placeholder="https://your-worker.workers.dev" />
  <button class="sbtn" onclick="saveProxy()">Save</button>
</div>

<video id="video" controls playsinline></video>
<div id="status">M3U file load করুন</div>
<div id="channels"></div>

<script>
let PROXY = localStorage.getItem('iptv_proxy') || '';
let channels = [];
let hls = null;

document.getElementById('proxy-input').value = PROXY;

function saveProxy() {
  PROXY = document.getElementById('proxy-input').value.trim().replace(/\/$/, '');
  localStorage.setItem('iptv_proxy', PROXY);
  document.getElementById('status').textContent = '✅ Proxy saved: ' + PROXY;
}

function buildProxyUrl(url, cookie, ua) {
  if (!PROXY) return url;
  let p = PROXY + '/?url=' + encodeURIComponent(url);
  if (cookie) p += '&cookie=' + encodeURIComponent(cookie);
  if (ua) p += '&ua=' + encodeURIComponent(ua);
  return p;
}

function parseM3U(text) {
  const lines = text.split('\n');
  const result = [];
  let cur = {};

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();

    if (line.startsWith('#EXTINF')) {
      cur = {};
      const name = line.match(/,(.+)$/);
      if (name) cur.name = name[1].trim();
      const group = line.match(/group-title="([^"]*)"/);
      if (group) cur.group = group[1] || 'Other';
      const logo = line.match(/tvg-logo="([^"]*)"/);
      if (logo) cur.logo = logo[1];
    }
    else if (line.startsWith('#EXTHTTP:')) {
      try {
        // trailing quote bug fix
        let raw = line.substring(9).trim();
        if (raw.endsWith('"')) raw = raw.slice(0, -1);
        const obj = JSON.parse(raw);
        if (obj.cookie) cur.cookie = obj.cookie;
      } catch(e) {}
    }
    else if (line.startsWith('#EXTVLCOPT')) {
      const ua = line.match(/http-user-agent=(.+)/i);
      if (ua) cur.ua = ua[1].trim();
    }
    else if (line.startsWith('http') && cur.name) {
      cur.url = line;
      result.push({ ...cur });
      cur = {};
    }
  }
  return result;
}

function renderChannels(list) {
  const container = document.getElementById('channels');
  container.innerHTML = '';

  const groups = {};
  list.forEach(ch => {
    const g = ch.group || 'Other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(ch);
  });

  Object.keys(groups).forEach(g => {
    const gt = document.createElement('div');
    gt.className = 'group-title';
    gt.textContent = g + ' (' + groups[g].length + ')';
    container.appendChild(gt);

    groups[g].forEach(ch => {
      const div = document.createElement('div');
      div.className = 'channel';

      const img = document.createElement('img');
      img.src = ch.logo || '';
      img.onerror = function() { this.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="34" height="34"><rect width="34" height="34" fill="%23333"/><text x="50%" y="55%" text-anchor="middle" fill="%23888" font-size="10">TV</text></svg>'; };

      const span = document.createElement('span');
      span.textContent = ch.name;

      div.appendChild(img);
      div.appendChild(span);
      div.onclick = () => playChannel(ch, div);
      container.appendChild(div);
    });
  });

  document.getElementById('status').textContent = '✅ ' + list.length + 'টি চ্যানেল লোড হয়েছে';
}

function playChannel(ch, el) {
  document.querySelectorAll('.channel.active').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');

  const src = buildProxyUrl(ch.url, ch.cookie, ch.ua);
  document.getElementById('status').textContent = '⏳ ' + ch.name + ' লোড হচ্ছে...';

  const video = document.getElementById('video');
  if (hls) { hls.destroy(); hls = null; }

  if (Hls.isSupported()) {
    hls = new Hls({
      enableWorker: false,
      maxBufferLength: 30,
      manifestLoadingTimeOut: 15000,
      manifestLoadingMaxRetry: 2
    });
    hls.loadSource(src);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
      document.getElementById('status').textContent = '▶ ' + ch.name;
    });
    hls.on(Hls.Events.ERROR, (e, d) => {
      console.error(d);
      if (d.fatal) {
        document.getElementById('status').textContent = '❌ ' + ch.name + ' — ' + d.details;
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src;
    video.play().catch(() => {});
    document.getElementById('status').textContent = '▶ ' + ch.name;
  } else {
    document.getElementById('status').textContent = '❌ HLS supported না';
  }
}

function loadFromUrl() {
  const url = document.getElementById('m3u-url').value.trim();
  if (!url) return;
  document.getElementById('status').textContent = '⏳ লোড হচ্ছে...';
  const src = PROXY ? PROXY + '/?url=' + encodeURIComponent(url) : url;
  fetch(src)
    .then(r => r.text())
    .then(t => { channels = parseM3U(t); renderChannels(channels); })
    .catch(e => { document.getElementById('status').textContent = '❌ ' + e.message; });
}

function loadFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = '⏳ File পড়া হচ্ছে...';
  const reader = new FileReader();
  reader.onload = e => { channels = parseM3U(e.target.result); renderChannels(channels); };
  reader.readAsText(file);
  event.target.value = '';
}
</script>
</body>
</html>
